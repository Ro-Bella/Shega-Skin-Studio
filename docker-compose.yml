services:
  # 1. Frontend Service (React)
  frontend:
    build: ./frontend
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx)
    depends_on:
      - backend

  # 2. Backend Service (Node.js)
  backend:
    build: ./backend
    # The port is no longer exposed to the host.
    # The 'frontend' service can still access it via the internal Docker network.
    env_file:
      - .env # Load environment variables from .env file
    depends_on:
      - mongo
    restart: unless-stopped

  # 3. Database Service (MongoDB)
  mongo:
    image: mongo
    # For production security, do not expose the database port to the host.
    # The backend service can access it via the internal Docker network.
    # ports:
    #   - "27017:27017" # Uncomment only if you need direct access from your host.
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
